            <button id="theme-toggle" aria-label="Toggle colour theme">&#9728; LIGHT</button>
        </div>
    </div>
</nav>

<div class="container">

<section id="contact" class="section">

        <a href="https://www.linkedin.com/in/giacomo-fantoni" class="link-card" target="_blank" rel="noopener">

        </a>
    </div>
</section>
</div>

<script>
    const toggleBtn = document.getElementById('theme-toggle');
    const htmlEl    = document.documentElement;
    const saved     = localStorage.getItem('theme');
    const sysLight  = window.matchMedia('(prefers-color-scheme: light)').matches;
    applyTheme(saved || (sysLight ? 'light' : 'dark'));

    toggleBtn.addEventListener('click', () => {
        applyTheme(htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    function applyTheme(theme) {
        htmlEl.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        toggleBtn.textContent = theme === 'dark' ? '\u2600 LIGHT' : '\uD83C\uDF11 DARK';
    }

    const menuBtn  = document.getElementById('menu-toggle');
    const navLinks = document.getElementById('nav-links');
    menuBtn.addEventListener('click', () => {
        const isOpen = navLinks.classList.toggle('nav-open');
        menuBtn.setAttribute('aria-expanded', String(isOpen));
        menuBtn.textContent = isOpen ? '\u2715' : '\u2630';
    });
</script>

</body>
</html>
