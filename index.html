<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Your Name] | [Your Title]</title>
    <style>
        /* Define Colors for Dark Mode (Default) */
        :root {
            --bg0: #282828;
            --bg1: #3c3836;
            --fg: #ebdbb2;
            --gray: #928374;
            --yellow: #fabd2f;
            --blue: #83a598;
            --green: #b8bb26;
            --orange: #fe8019;
            --aqua: #8ec07c;
        }

        /* Define Colors for Light Mode Override */
        [data-theme="light"] {
            --bg0: #fbf1c7;
            --bg1: #f2e5bc;
            --fg: #3c3836;
            --gray: #928374;
            --yellow: #b57614; /* Darker yellow for readability */
            --blue: #076678;   /* Deep blue */
            --green: #79740e;  /* Deep green */
            --orange: #af3a03;
            --aqua: #427b58;
        }

        body {
            font-family: 'ui-monospace', 'Cascadia Code', monospace;
            line-height: 1.6;
            color: var(--fg);
            background-color: var(--bg0);
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* The Theme Toggle Button */
        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg1);
            color: var(--fg);
            border: 1px solid var(--gray);
            padding: 8px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        header {
            text-align: left;
            margin-bottom: 50px;
            border-left: 4px solid var(--yellow);
            padding-left: 20px;
        }

        .section {
            background: var(--bg1);
            padding: 30px;
            border-radius: 4px;
            margin-bottom: 24px;
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }

        h1 { font-size: 2.2rem; margin: 0; color: var(--fg); }
        h2 { color: var(--aqua); text-transform: uppercase; font-size: 1.1rem; }

        .cta-group { display: flex; gap: 15px; margin-top: 20px; }
        .btn {
            padding: 12px 20px;
            text-decoration: none;
            font-weight: bold;
            color: var(--bg0) !important; /* Always dark text on bright buttons */
        }
        .btn-primary { background: var(--green); }
        .btn-secondary { background: var(--orange); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
        .link-card {
            padding: 10px;
            border: 1px solid var(--gray);
            text-decoration: none;
            color: var(--fg);
            text-align: center;
        }
        .link-card:hover { border-color: var(--blue); color: var(--blue); }

        footer { color: var(--gray); font-size: 0.8rem; margin-top: 40px; }

        @media (max-width: 600px) {
            .cta-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<button id="theme-toggle">Switch Theme</button>

<div class="container">
    <header>
        <h1>[Your Name]</h1>
        <p style="color: var(--blue); font-weight: bold;">[Field] // [Organization]</p>
    </header>

    <section class="section">
        <h2>About</h2>
        <p>Expertise in <strong>[Topic A]</strong> and <strong>[Topic B]</strong>. Focused on creating highly robust systems.</p>
    </section>

    <section class="section" style="border-top: 4px solid var(--green);">
        <h2>Research Materials</h2>
        <div class="cta-group">
            <a href="posters/poster.pdf" class="btn btn-primary">Download Poster</a>
            <a href="papers/paper.pdf" class="btn btn-secondary">Full Paper</a>
        </div>
    </section>

    <section class="section">
        <h2>Connect</h2>
        <div class="grid">
            <a href="#" class="link-card">LinkedIn</a>
            <a href="#" class="link-card">GitHub</a>
            <a href="#" class="link-card">Scholar</a>
        </div>
    </section>

    <footer>
        <p>Generated with Gruvbox Adaptive Theme • 2026</p>
    </footer>
</div>

<script>
    const toggleBtn = document.getElementById('theme-toggle');
    const htmlElement = document.documentElement;

    // Check for saved preference, otherwise use system setting
    const currentTheme = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');

    htmlElement.setAttribute('data-theme', currentTheme);

    toggleBtn.addEventListener('click', () => {
        let theme = htmlElement.getAttribute('data-theme');
        let newTheme = theme === 'dark' ? 'light' : 'dark';

        htmlElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    });
</script>

</body>
</html>
